# =========================================================
# Selenium Grid Framework - Configuration
# =========================================================

# URL of the Selenium Grid 4 Hub (Router) endpoint.
# This is the address every node registers with and every
# test connects to in order to request a remote session.
grid.url=http://localhost:4444/wd/hub

# Default browser used when no -Dbrowser system property
# is supplied (overridden per <test> in testng.xml).
default.browser=chrome

# Run browsers headless (true/false) - useful for CI nodes
headless=true

# Implicit wait (seconds) applied to every RemoteWebDriver session
implicit.wait=10

# Page load timeout (seconds)
page.load.timeout=30

# Base URL for the application under test
base.url=https://www.google.com
